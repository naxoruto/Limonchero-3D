name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.0"
  PYTHON_VERSION: "3.11"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            godot_preset: juego
            game_out: dist/game/limons.exe
            backend_name: limonchero-backend.exe
            artifact_name: limonchero-windows-installer
            artifact_path: dist/installer-out/limonchero-setup-win.exe
          - os: ubuntu-latest
            platform: linux
            godot_preset: juego_linux
            game_out: dist/game/limons.x86_64
            backend_name: limonchero-backend
            artifact_name: limonchero-linux-appimage
            artifact_path: dist/installer/limonchero-linux-x86_64.AppImage
          - os: macos-latest
            platform: macos
            godot_preset: juego_macos
            game_out: dist/game/limons.app
            backend_name: limonchero-backend
            artifact_name: limonchero-macos-dmg
            artifact_path: dist/installer/limonchero-macos.dmg
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller
          python -m pip show pyinstaller

      - name: Build backend
        run: |
          python -m PyInstaller --clean --noconfirm --onefile \
            --name limonchero-backend \
            --paths backend \
            --hidden-import config \
            --hidden-import main \
            --collect-data faster_whisper \
            --distpath dist/backend \
            --workpath build/pyinstaller \
            backend/launcher.py

      - name: Export game
        run: |
          mkdir -p dist/game
          godot --headless --path game --export-release "${{ matrix.godot_preset }}" "${{ matrix.game_out }}"

      - name: Ensure game executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x "${{ matrix.game_out }}"

      - name: Ensure backend executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x "dist/backend/${{ matrix.backend_name }}"

      - name: Stage installer files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\installer\game, dist\installer\backend, dist\installer-out | Out-Null
          Copy-Item -Path dist\game\* -Destination dist\installer\game -Recurse -Force
          Copy-Item -Path dist\backend\* -Destination dist\installer\backend -Recurse -Force

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc `
            "/DAppVersion=$version" `
            "/DSourceDir=dist\installer" `
            "/DOutputDir=dist\installer-out" `
            "/DOutputBaseFilename=limonchero-setup-win" `
            "tools\installers\windows\limonchero.iss"

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: |
          chmod +x tools/installers/linux/build_appimage.sh
          tools/installers/linux/build_appimage.sh

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          chmod +x tools/installers/macos/build_dmg.sh
          tools/installers/macos/build_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          generateReleaseNotes: true
          artifacts: release-artifacts/**/*
