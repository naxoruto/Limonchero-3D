
<div style="display:flex; flex-direction:column; align-items:center; padding: 2rem 1rem; gap: 1.5rem;">
  <h2 class="sr-only">Código QR para tu Google Form</h2>
  <p style="font-size:14px; color:var(--color-text-secondary); margin:0; text-align:center;">Escanea este QR para abrir tu formulario</p>
  <div id="qrcode" style="background:white; padding:16px; border-radius:var(--border-radius-lg); border:0.5px solid var(--color-border-tertiary);"></div>
  <p style="font-size:12px; color:var(--color-text-tertiary); margin:0; word-break:break-all; text-align:center; max-width:400px;">
    docs.google.com/forms/d/e/1FAIpQLSdqs2rXAy6pXh6Fx7WNqPpzLKdE7vv4MF8Y6Kr6CXHEl1qB6g/viewform
  </p>
  <button onclick="downloadQR()" style="display:flex; align-items:center; gap:8px; cursor:pointer;">
    <i class="ti ti-download" aria-hidden="true"></i> Descargar QR
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const url = "https://docs.google.com/forms/d/e/1FAIpQLSdqs2rXAy6pXh6Fx7WNqPpzLKdE7vv4MF8Y6Kr6CXHEl1qB6g/viewform?usp=sharing&ouid=101592593495020475732";

  new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 240,
    height: 240,
    colorDark: "#1a1a1a",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  function downloadQR() {
    setTimeout(() => {
      const canvas = document.querySelector("#qrcode canvas");
      if (canvas) {
        const link = document.createElement("a");
        link.download = "qr-google-form.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }
    }, 200);
  }
</script>
